<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>FitforIN — La Scienza applicata allo Sport</title>
    <meta name="description" content="Articoli tecnici su allenamento, nutrizione, basket e performance sportiva fondati sulla scienza. Contenuti gratuiti per chi prende lo sport sul serio." />
    <meta name="author" content="Fabio Forin" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.fitforin.it/" />

    <!-- Open Graph / Social -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.fitforin.it/" />
    <meta property="og:site_name"   content="FitforIN" />
    <meta property="og:title"       content="FitforIN — La Scienza applicata allo Sport" />
    <meta property="og:description" content="Articoli tecnici su allenamento, nutrizione, basket e performance sportiva fondati sulla scienza." />
    <meta property="og:locale"      content="it_IT" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="FitforIN — La Scienza applicata allo Sport" />
    <meta name="twitter:description" content="Articoli tecnici su allenamento, nutrizione, basket e performance sportiva fondati sulla scienza." />

    <!-- Theme -->
    <meta name="theme-color" content="#161412" />
    <meta name="color-scheme" content="dark" />

    <!-- Performance: preconnect to Google Fonts & image CDNs -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://images.pexels.com" />

    <!-- Structured data — Organisation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": "FitforIN",
      "description": "Blog scientifico su allenamento, nutrizione e performance sportiva.",
      "url": "https://www.fitforin.it/",
      "publisher": {
        "@type": "Person",
        "name": "Fabio Forin"
      },
      "inLanguage": "it"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
